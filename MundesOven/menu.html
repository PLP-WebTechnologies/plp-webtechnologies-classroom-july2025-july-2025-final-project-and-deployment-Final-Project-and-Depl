<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munde's Oven | Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo-container">
            <img src="images/logo.jpg" alt="Munde's Oven Logo" class="logo-img">
            <span class="logo-text">Munde's Oven</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">&#9776;</div>
        </nav>
    </header>

    <!-- Menu Section -->
    <section class="menu">
        <h1>Our Menu</h1>
        <div class="product-grid">
            <div class="product-card">
                <img src="images/products/cake1.jpg" alt="Chocolate Cake">
                <h3>Chocolate Cake</h3>
                <p>$15</p>
            </div>
            <div class="product-card">
                <img src="images/products/bread1.jpg" alt="Sourdough Bread">
                <h3>Sourdough Bread</h3>
                <p>$5</p>
            </div>
            <div class="product-card">
                <img src="images/products/pastry1.jpg" alt="Buttery Pastry">
                <h3>Buttery Pastry</h3>
                <p>$3</p>
            </div>
            <div class="product-card">
                <img src="images/products/cake2.jpg" alt="Vanilla Cake">
                <h3>Vanilla Cake</h3>
                <p>$14</p>
            </div>
            <div class="product-card">
                <img src="images/products/bread2.jpg" alt="Baguette">
                <h3>Baguette</h3>
                <p>$4</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Munde's Oven. All rights reserved.</p>
        <div class="socials">
            <a href="#">Instagram</a> | 
            <a href="#">Facebook</a> | 
            <a href="#">Twitter</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
