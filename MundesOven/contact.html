<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munde's Oven | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo-container">
            <img src="images/logo.jpg" alt="Munde's Oven Logo" class="logo-img">
            <span class="logo-text">Munde's Oven</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">&#9776;</div>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact">
    <h1>Contact Us</h1>
    <p class="contact-subtitle">We’d love to hear from you! Drop us a message below.</p>
    <form class="contact-form" onsubmit="return validateForm()">
        <div class="form-group">
            <input type="text" id="name" placeholder="Your Name" required>
        </div>
        <div class="form-group">
            <input type="email" id="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
            <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>

    <div class="location">
        <h3>Our Location</h3>
        <p>Kasarani, Nairobi, Kenya</p>
        <p>Mon-Sat: 8am - 6pm</p>
    </div>
</section>

    <footer>
        <p>&copy; 2025 Munde's Oven. All rights reserved.</p>
        <div class="socials">
            <a href="#">Instagram</a> | 
            <a href="#">Facebook</a> | 
            <a href="#">Twitter</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
