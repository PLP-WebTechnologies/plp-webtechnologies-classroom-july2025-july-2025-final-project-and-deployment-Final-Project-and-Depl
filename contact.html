<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brew Haven Coffee - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <h1 class="logo">Brew Haven</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <button class="menu-toggle">☰</button>
    </nav>
  </header>

  <main>
    <section class="content">
      <h2>Contact Us</h2>
      <p>We’d love to hear from you! Send us a message below.</p>

      <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="message">Message:</label>
        <textarea id="message" required></textarea>

        <button type="submit">Send</button>
      </form>
      <p id="formMessage"></p>

      <div class="map">
        <h3>Visit Us</h3>
        <p>Brew Haven Coffee, Main Street, Nairobi, Kenya</p>
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1994.628!2d36.8219!3d-1.2921" 
          width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Brew Haven Coffee. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
