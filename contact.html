<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device‑width, initial-scale=1.0" />
  <title>Contact — M‑PesaAssist</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">M‑PesaAssist</a>
      <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Features</a></li>
          <li><a href="chat.html">Chat</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Contact Us</h1>
    <p>Have questions, feedback, or want to partner? Reach out below:</p>

    <form id="contact-form">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="subject">Subject:</label>
      <input type="text" id="subject" name="subject" />

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <div id="form-response" class="hidden"></div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 M‑PesaAssist. All rights reserved.</p>
      <ul class="social">
        <li><a href="#" aria-label="Twitter">Twitter</a></li>
        <li><a href="#" aria-label="LinkedIn">LinkedIn</a></li>
        <li><a href="#" aria-label="GitHub">GitHub</a></li>
      </ul>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
